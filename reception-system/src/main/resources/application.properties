spring.application.name=reception-system
spring.config.import=optional:file:.env[.properties]


# ========================
# DATABASE
# ========================
spring.datasource.url=jdbc:mysql://localhost:3306/application_System?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=application_admin
spring.datasource.password=passwordgobrr
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

server.port=8081

# ========================
# JPA / HIBERNATE
# ========================
#spring.jpa.hibernate.ddl-auto=update
#spring.jpa.show-sql=true

spring.jpa.properties.hibernate.format_sql=true

# ========================
# SERVER
# ========================
#server.port=${SERVER_PORT:8080}

# ========================
# JWT
# ========================
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ========================
# EMAIL (Gmail example)
# ========================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ========================
# LOGGING
# ========================
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG


spring.security.user.name=${SPRING_SECURITY_USER_NAME:admin}
spring.security.user.password=${SPRING_SECURITY_USER_PASSWORD:admin123}